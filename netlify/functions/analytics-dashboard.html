<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucy Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1e3a5f;
            --navy-dark: #152a45;
            --navy-light: #2d4a6f;
            --coral: #e07a5f;
            --coral-dark: #c96a52;
            --coral-light: #e89680;
            --white: #FFFFFF;
            --gray-light: #94A3B8;
            --green: #22c55e;
            --blue: #3b82f6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
            min-height: 100vh;
            color: var(--white);
            padding: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .header-logo {
            width: 80px;
            height: auto;
            margin-bottom: 1rem;
        }
        
        .subtitle {
            color: var(--gray-light);
            font-size: 1rem;
        }
        
        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .filter-group label {
            font-size: 0.75rem;
            color: var(--gray-light);
            text-transform: uppercase;
        }
        
        select, input[type="date"] {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: var(--navy-light);
            color: var(--white);
            font-size: 0.9rem;
            min-width: 150px;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            background: var(--coral);
            color: var(--white);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            align-self: flex-end;
        }
        
        .btn:hover {
            background: var(--coral-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.4);
        }
        
        .btn-secondary {
            background: var(--navy-light);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-secondary:hover {
            background: var(--navy);
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .metric-card {
            background: var(--navy-light);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--coral);
            margin-bottom: 0.25rem;
        }
        
        .metric-label {
            font-size: 0.85rem;
            color: var(--gray-light);
        }
        
        .metric-card.highlight {
            background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
        }
        
        .metric-card.highlight .metric-value {
            color: var(--white);
        }
        
        .metric-card.highlight .metric-label {
            color: rgba(255,255,255,0.9);
        }
        
        .section {
            background: var(--navy-light);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .section h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding: 1rem 0;
        }
        
        .bar {
            flex: 1;
            background: var(--coral);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            position: relative;
            transition: all 0.3s;
        }
        
        .bar:hover {
            background: var(--coral-light);
        }
        
        .bar-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--gray-light);
            white-space: nowrap;
        }
        
        .bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--white);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .bar:hover .bar-value {
            opacity: 1;
        }
        
        .list {
            list-style: none;
        }
        
        .list li {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .list li:last-child {
            border-bottom: none;
        }
        
        .list-name {
            font-weight: 500;
        }
        
        .list-value {
            color: var(--coral);
            font-weight: 600;
        }
        
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .two-col {
                grid-template-columns: 1fr;
            }
        }
        
        .loading {
            text-align: center;
            padding: 4rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--coral);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--gray-light);
        }
        
        .empty-state h2 {
            margin-bottom: 0.5rem;
            color: var(--white);
        }
        
        .export-btn {
            margin-left: auto;
        }
        
        @media (max-width: 600px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                width: 100%;
            }
            
            select, input[type="date"] {
                width: 100%;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img id="headerLogo" src="" alt="Lucy" class="header-logo" style="display: none;">
            <h1>Lucy Analytics Dashboard</h1>
            <p class="subtitle">Track guest interactions and measure value</p>
        </header>
        
        <div class="filters">
            <div class="filter-group">
                <label>Property</label>
                <select id="propertyFilter">
                    <option value="all">All Properties</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Start Date</label>
                <input type="date" id="startDate">
            </div>
            <div class="filter-group">
                <label>End Date</label>
                <input type="date" id="endDate">
            </div>
            <button class="btn" onclick="handleApplyFilters()">Apply Filters</button>
            <button class="btn btn-secondary export-btn" onclick="handleExportReport()">📥 Export CSV</button>
        </div>
        
        <div id="dashboard">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading analytics...</p>
            </div>
        </div>
    </div>

    <script>
        // Get property from URL parameter (e.g., ?property=hook-weim-sinker)
        const urlParams = new URLSearchParams(window.location.search);
        const urlProperty = urlParams.get('property');
        
        // Set default dates (last 30 days)
        const today = new Date();
        const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        
        // If property specified in URL, pre-select it
        if (urlProperty && urlProperty !== 'all') {
            const select = document.getElementById('propertyFilter');
            const option = document.createElement('option');
            option.value = urlProperty;
            option.textContent = urlProperty;
            option.selected = true;
            select.appendChild(option);
        }
        
        let currentData = null;
        let dashboardSectionTitle = 'Top Picks'; // Default, will be fetched from PM Group
        
        // ========== ANALYTICS TRACKING ==========
        async function trackEvent(eventType, eventDetail, eventCategory = '') {
            try {
                const property = document.getElementById('propertyFilter').value;
                await fetch('/.netlify/functions/log-analytics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        property_slug: property !== 'all' ? property : 'dashboard',
                        event_type: eventType,
                        event_detail: eventDetail,
                        event_category: eventCategory
                    })
                });
            } catch (e) {
                console.log('Analytics tracking failed:', e);
            }
        }
        
        // ========== BUTTON HANDLERS WITH TRACKING ==========
        function handleApplyFilters() {
            trackEvent('dashboard_click', 'apply_filters', 'dashboard');
            loadDashboard();
        }
        
        function handleExportReport() {
            trackEvent('dashboard_click', 'export_csv', 'dashboard');
            exportReport();
        }
        
        // ========== FETCH DASHBOARD SECTION TITLE AND LOGO ==========
        async function fetchPropertyGroupData(propertySlug) {
            const result = {
                sectionTitle: 'Top Picks',
                logo: null
            };
            
            if (!propertySlug || propertySlug === 'all') {
                // For "all properties", try to get logo from first available property
                try {
                    const response = await fetch(`/.netlify/functions/get-analytics?property_slug=all&report_type=summary`);
                    const data = await response.json();
                    if (data.summary && data.summary.by_property) {
                        const firstProperty = Object.keys(data.summary.by_property).find(p => p !== 'unknown');
                        if (firstProperty) {
                            const propResponse = await fetch(`/.netlify/functions/get-property?slug=${firstProperty}`);
                            const propData = await propResponse.json();
                            if (propData.propertyGroup && propData.propertyGroup.logo) {
                                // Airtable attachments come as an array
                                const logoField = propData.propertyGroup.logo;
                                result.logo = Array.isArray(logoField) ? logoField[0]?.url : logoField;
                            }
                        }
                    }
                } catch (e) {
                    console.log('Could not fetch logo for all properties:', e);
                }
                return result;
            }
            
            try {
                const response = await fetch(`/.netlify/functions/get-property?slug=${propertySlug}`);
                const data = await response.json();
                
                if (data.propertyGroup) {
                    if (data.propertyGroup.dashboard_section_title) {
                        result.sectionTitle = data.propertyGroup.dashboard_section_title;
                    }
                    if (data.propertyGroup.logo) {
                        // Airtable attachments come as an array
                        const logoField = data.propertyGroup.logo;
                        result.logo = Array.isArray(logoField) ? logoField[0]?.url : logoField;
                    }
                }
            } catch (e) {
                console.log('Could not fetch property group data:', e);
            }
            
            return result;
        }
        
        function updateHeaderLogo(logoUrl) {
            const logoImg = document.getElementById('headerLogo');
            if (logoUrl) {
                logoImg.src = logoUrl;
                logoImg.style.display = 'block';
            } else {
                logoImg.style.display = 'none';
            }
        }
        
        async function loadDashboard() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading analytics...</p></div>`;
            
            const property = document.getElementById('propertyFilter').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            try {
                // Fetch dashboard section title and logo from PM Group
                const groupData = await fetchPropertyGroupData(property);
                dashboardSectionTitle = groupData.sectionTitle;
                updateHeaderLogo(groupData.logo);
                
                const params = new URLSearchParams({
                    property_slug: property,
                    start_date: startDate,
                    end_date: endDate,
                    report_type: 'summary'
                });
                
                const response = await fetch(`/.netlify/functions/get-analytics?${params}`);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Failed to load data');
                }
                
                currentData = data;
                
                // Track dashboard load
                trackEvent('dashboard_view', 'dashboard_loaded', 'dashboard');
                
                if (data.record_count === 0) {
                    dashboard.innerHTML = `
                        <div class="empty-state">
                            <h2>📊 No Data Yet</h2>
                            <p>Analytics will appear here once guests start using Lucy.</p>
                        </div>
                    `;
                    return;
                }
                
                renderDashboard(data.summary);
                populatePropertyFilter(data.summary.by_property);
                
            } catch (e) {
                console.error('Dashboard error:', e);
                dashboard.innerHTML = `
                    <div class="empty-state">
                        <h2>⚠️ Error Loading Data</h2>
                        <p>${e.message}</p>
                    </div>
                `;
            }
        }
        
        function renderDashboard(stats) {
            const dashboard = document.getElementById('dashboard');
            
            // Build peak hours chart
            const hours = Array.from({length: 24}, (_, i) => i);
            const maxHourValue = Math.max(...Object.values(stats.peak_hours || {}), 1);
            const hoursChart = hours.map(h => {
                const value = stats.peak_hours?.[h] || 0;
                const height = (value / maxHourValue) * 100;
                const label = h === 0 ? '12a' : h < 12 ? `${h}a` : h === 12 ? '12p' : `${h-12}p`;
                return `<div class="bar" style="height: ${Math.max(height, 2)}%">
                    <span class="bar-value">${value}</span>
                    <span class="bar-label">${label}</span>
                </div>`;
            }).join('');
            
            // Build top recommendations list (using dynamic section title)
            const topRecs = (stats.top_recommendations || []).slice(0, 8).map(([name, count]) => 
                `<li><span class="list-name">${name}</span><span class="list-value">${count} clicks</span></li>`
            ).join('') || '<li>No data yet</li>';
            
            // Build category breakdown
            const categories = Object.entries(stats.by_category || {})
                .filter(([cat]) => cat !== 'unknown')
                .sort((a, b) => b[1] - a[1])
                .map(([cat, count]) => 
                    `<li><span class="list-name">${cat}</span><span class="list-value">${count}</span></li>`
                ).join('') || '<li>No data yet</li>';
            
            dashboard.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-card highlight">
                        <div class="metric-value">${stats.time_saved_hours || 0}</div>
                        <div class="metric-label">Hours Saved</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${stats.questions_answered || 0}</div>
                        <div class="metric-label">Questions Answered</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${stats.voice_calls || 0}</div>
                        <div class="metric-label">Voice Calls</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${stats.unique_sessions || 0}</div>
                        <div class="metric-label">Unique Sessions</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${stats.app_opens || 0}</div>
                        <div class="metric-label">App Opens</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${stats.card_clicks || 0}</div>
                        <div class="metric-label">Recommendations Clicked</div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>📈 Activity by Hour</h2>
                    <div class="chart-container">
                        ${hoursChart}
                    </div>
                </div>
                
                <div class="two-col">
                    <div class="section">
                        <h2>🏆 Top Recommendations</h2>
                        <p style="font-size: 0.75rem; color: var(--gray-light); margin-bottom: 0.75rem;">${dashboardSectionTitle}</p>
                        <ul class="list">${topRecs}</ul>
                    </div>
                    <div class="section">
                        <h2>📂 By Category</h2>
                        <ul class="list">${categories}</ul>
                    </div>
                </div>
            `;
        }
        
        function populatePropertyFilter(byProperty) {
            const select = document.getElementById('propertyFilter');
            const currentValue = select.value;
            
            // Keep "All Properties" and add unique properties
            const properties = Object.keys(byProperty || {}).filter(p => p !== 'unknown');
            
            select.innerHTML = '<option value="all">All Properties</option>' +
                properties.map(p => `<option value="${p}" ${p === currentValue ? 'selected' : ''}>${p}</option>`).join('');
        }
        
        function exportReport() {
            if (!currentData || !currentData.summary) {
                alert('No data to export. Apply filters first.');
                return;
            }
            
            const stats = currentData.summary;
            const property = document.getElementById('propertyFilter').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            // Create CSV content
            let csv = 'Lucy Analytics Report\n';
            csv += `Property,${property === 'all' ? 'All Properties' : property}\n`;
            csv += `Date Range,${startDate} to ${endDate}\n`;
            csv += '\n';
            csv += 'Key Metrics\n';
            csv += `Hours Saved,${stats.time_saved_hours}\n`;
            csv += `Questions Answered,${stats.questions_answered}\n`;
            csv += `Voice Calls,${stats.voice_calls}\n`;
            csv += `Unique Sessions,${stats.unique_sessions}\n`;
            csv += `App Opens,${stats.app_opens}\n`;
            csv += `Recommendations Clicked,${stats.card_clicks}\n`;
            csv += '\n';
            csv += `Top Recommendations (${dashboardSectionTitle})\n`;
            csv += 'Name,Clicks\n';
            (stats.top_recommendations || []).forEach(([name, count]) => {
                csv += `"${name}",${count}\n`;
            });
            csv += '\n';
            csv += 'Category Breakdown\n';
            csv += 'Category,Events\n';
            Object.entries(stats.by_category || {}).forEach(([cat, count]) => {
                csv += `"${cat}",${count}\n`;
            });
            
            // Download
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lucy-analytics-${property}-${startDate}-to-${endDate}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }
        
        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
