<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucy Concierge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2744 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: white;
        }
        .logo { height: 80px; margin-bottom: 1rem; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .tagline {
            color: rgba(255,255,255,0.7);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }
        .properties {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }
        .property-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.1);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .property-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
        }
        .property-icon { font-size: 2rem; }
        .property-info { flex: 1; }
        .property-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        .property-location {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }
        .arrow { font-size: 1.25rem; color: #e07a5f; }
    </style>
</head>
<body>
    <h1>Lucy Concierge</h1>
    <p class="tagline">Your AI-powered vacation assistant</p>
    
    <div class="properties">
        <a href="/hookweimsinker" class="property-card">
            <div class="property-icon">🏖️</div>
            <div class="property-info">
                <div class="property-name">Hook, Weim & Sinker</div>
                <div class="property-location">Inlet Beach, FL</div>
            </div>
            <div class="arrow">›</div>
        </a>
        
        <a href="/serenity" class="property-card">
            <div class="property-icon">🏔️</div>
            <div class="property-info">
                <div class="property-name">Serenity</div>
                <div class="property-location">Rabun Gap, GA</div>
            </div>
            <div class="arrow">›</div>
        </a>
    </div>
</body>
</html>
